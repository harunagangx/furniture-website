<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss">
      @theme {
        --color-primary: #054c73;
        --color-secondary: #f2f5ff;
      }
    </style>
    <title>Document</title>
  </head>
  <body class="flex flex-col w-full min-h-screen relative">
    <!-- Header -->
    <header class="w-full sticky top-0 z-10 p-2 lg:px-18 lg:py-5">
      <nav class="w-full flex justify-between items-center">
        <div class="font-bold text-primary text-lg lg:text-4xl">Furniture</div>

        <!-- Mobile menu button -->
        <button id="mobile-menu-button" class="w-8 lg:hidden cursor-pointer">
          <img src="/assets/icons/mobile-menu-icon.svg" alt="Menu" />
        </button>

        <!-- Navigation links -->
        <div class="hidden flex items-center gap-3 transition nav-items-container lg:gap-10 lg:flex">
          <a href="#">Home</a>
          <a href="#">Service</a>
          <a href="#">Doctors</a>
          <a href="#">Products</a>
          <a href="#">Gallery</a>
        </div>
      </nav>
    </header>
  </body>
</html>
