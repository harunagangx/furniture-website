<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss">
      @theme {
        --color-primary: #054c73;
        --color-secondary: #f2f5ff;
      }
    </style>
    <title>Document</title>
  </head>
  <body class="flex flex-col w-full min-h-screen relative">
    <!-- Header -->
    <header class="w-full sticky top-0 z-10 p-2 lg:px-18 lg:py-5">
      <nav class="w-full flex justify-between items-center">
        <div class="font-bold text-primary text-lg lg:text-4xl">Furniture</div>

        <!-- Mobile menu button -->
        <button id="mobile-menu-button" class="w-8 lg:hidden cursor-pointer">
          <img src="/assets/icons/mobile-menu-icon.svg" alt="Menu" />
        </button>

        <!-- Navigation links -->
        <div class="hidden flex items-center gap-3 transition nav-items-container lg:gap-10 lg:flex">
          <a href="#">Home</a>
          <a href="#">Service</a>
          <a href="#">Doctors</a>
          <a href="#">Products</a>
          <a href="#">Gallery</a>
        </div>
      </nav>
    </header>

    <!-- Main content -->
    <main class="flex-grow">
      <div>main content</div>
    </main>

    <!-- Footer -->
    <footer class="w-full bg-primary text-white p-2 lg:px-18 lg:py-5">
      <div class="grid grid-cols-6 gap-5 lg:gap-10">
        <!-- Footer left section -->
        <div class="col-span-6 lg:col-span-2">
          <h3 class="text-xl font-bold lg:text-2xl">Beauty Care</h3>

          <p class="mt-2 mb-2 lg:mt-5">
            Lorem ipsum dolor sit amet consectetur adipisicing elit. Sed voluptate minima cum soluta, adipisci veritatis
            quis. Esse numquam blanditiis nisi pariatur amet totam quibusdam voluptate.
          </p>

          <h3 class="text-xl font-bold lg:text-2xl">Follow us</h3>
        </div>

        <!-- Footer right section -->
        <div class="footer-container col-span-6 lg:col-span-4">
          <h3 class="text-xl font-bold lg:text-2xl">Instagram Shop</h3>

          <div class="w-full flex flex-wrap items-center gap-3 mt-2 pb-2 lg:mt-5 lg:gap-6">
            <img src="/assets/images/footer-image-1.jpg" alt="" />
            <img src="/assets/images/footer-image-2.jpg" alt="" />
            <img src="/assets/images/footer-image-3.jpg" alt="" />
            <img src="/assets/images/footer-image-4.jpg" alt="" />
          </div>
        </div>
      </div>
    </footer>
  </body>
</html>
